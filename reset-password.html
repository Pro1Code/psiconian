<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña · Mian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--gris-95), var(--blanco));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }
        .reset-card {
            background: white;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--sombra-card);
            border: 1px solid var(--accento-claro);
        }
        .reset-card h1 {
            color: var(--azul-profundo);
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .message {
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .password-requirements {
            font-size: 0.8rem;
            color: var(--gris-50);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>🔐 Nueva contraseña</h1>
        <p style="color: var(--gris-50); margin-bottom: 2rem;">Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
        
        <div id="messageBox" class="message"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">nueva contraseña</label>
                <input type="password" id="newPassword" required minlength="8">
                <div class="password-requirements">Mínimo 8 caracteres</div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">confirmar contraseña</label>
                <input type="password" id="confirmPassword" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full" id="submitBtn">cambiar contraseña</button>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a href="index.html" style="color: var(--gris-50);">← volver al inicio</a>
            </div>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('messageBox').className = 'message error';
            document.getElementById('messageBox').textContent = 'Token no válido o expirado';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const messageBox = document.getElementById('messageBox');
            const submitBtn = document.getElementById('submitBtn');
            
            if (newPass !== confirmPass) {
                messageBox.className = 'message error';
                messageBox.textContent = 'Las contraseñas no coinciden';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'cambiando...';
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        password: newPass
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    messageBox.className = 'message success';
                    messageBox.textContent = '✅ Contraseña actualizada. Redirigiendo al login...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    messageBox.className = 'message error';
                    messageBox.textContent = '❌ ' + result.message;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'cambiar contraseña';
                }
                
            } catch (error) {
                messageBox.className = 'message error';
                messageBox.textContent = 'Error de conexión';
                submitBtn.disabled = false;
                submitBtn.textContent = 'cambiar contraseña';
            }
        });
    </script>
</body>
</html>
